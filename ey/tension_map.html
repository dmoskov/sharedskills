<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tension & Conflict Map - The Masculine Mongoose</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }
        h1 {
            text-align: center;
            color: #ff6b6b;
        }
        #tension-map {
            width: 100%;
            height: 700px;
            position: relative;
            background: radial-gradient(circle at center, #2a0a0a 0%, #0a0a0a 100%);
            border: 2px solid #333;
        }
        .tension-zone {
            position: absolute;
            border-radius: 50%;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tension-zone:hover {
            transform: scale(1.1);
            opacity: 1;
            z-index: 10;
        }
        .zone-label {
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .connection {
            position: absolute;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            height: 2px;
            transform-origin: left center;
            pointer-events: none;
        }
        .detail-box {
            position: absolute;
            background: rgba(0,0,0,0.9);
            border: 2px solid #ff6b6b;
            border-radius: 10px;
            padding: 15px;
            display: none;
            z-index: 100;
            max-width: 300px;
        }
        .intensity-meter {
            position: absolute;
            right: 20px;
            top: 20px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .meter-item {
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        .meter-bar {
            width: 100px;
            height: 20px;
            background: linear-gradient(to right, #4ecdc4, #ffe66d, #ff6b6b);
            border-radius: 10px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>Tension & Conflict Map - The Masculine Mongoose</h1>
    <div id="tension-map">
        <div class="intensity-meter">
            <h3>Tension Intensity</h3>
            <div class="meter-item">
                <span>Low</span>
                <div class="meter-bar"></div>
                <span>High</span>
            </div>
            <div style="margin-top: 20px;">
                <div style="color: #4ecdc4">● Personal Tension</div>
                <div style="color: #ffe66d">● Social Tension</div>
                <div style="color: #ff6b6b">● Life-Threatening</div>
                <div style="color: #a8e6cf">● Ethical Dilemma</div>
            </div>
        </div>
    </div>

    <div class="detail-box" id="detail-box">
        <h3 id="detail-title"></h3>
        <p id="detail-content"></p>
    </div>

    <script>
        const tensions = [
            {
                id: "identity-core",
                label: "Identity\nDeception\nCore",
                x: 50,
                y: 50,
                size: 180,
                color: "#ff6b6b",
                intensity: 10,
                description: "The central lie that Bruce is the Mongoose. This creates cascading effects on every aspect of his life, from dating to survival. He must maintain this fiction even when it puts his life at risk."
            },
            {
                id: "assassination",
                label: "Assassination\nAttempts",
                x: 70,
                y: 30,
                size: 120,
                color: "#ff6b6b",
                intensity: 9,
                description: "Smart Guy With A Gun and others try to prove Bruce is the Mongoose by attempting to kill him, believing he's invulnerable. Bruce must survive without powers."
            },
            {
                id: "mask-code",
                label: "Mask Code\nDilemma",
                x: 30,
                y: 70,
                size: 140,
                color: "#a8e6cf",
                intensity: 8,
                description: "The social contract that protects identities creates situations where Bruce can't deny being the Mongoose or act to save people without 'revealing' himself."
            },
            {
                id: "dating",
                label: "Dating\nImpossibility",
                x: 20,
                y: 40,
                size: 100,
                color: "#4ecdc4",
                intensity: 7,
                description: "Bruce can't form genuine relationships. Women think he's testing if they like him for himself vs his hero identity, creating painful misunderstandings."
            },
            {
                id: "public-expectation",
                label: "Public\nExpectations",
                x: 75,
                y: 60,
                size: 130,
                color: "#ffe66d",
                intensity: 8,
                description: "During crises like bank robberies, hostages expect Bruce to save them. Children question why he won't fight villains, adding moral pressure."
            },
            {
                id: "family-protection",
                label: "20+ Lives\nat Stake",
                x: 50,
                y: 20,
                size: 110,
                color: "#4ecdc4",
                intensity: 9,
                description: "The real Mongoose's spouse, 3 kids, siblings, and 16 nieces/nephews would become targets if his identity were known. Bruce's sacrifice protects them all."
            },
            {
                id: "villain-games",
                label: "Villain\nMind Games",
                x: 80,
                y: 45,
                size: 90,
                color: "#a8e6cf",
                intensity: 7,
                description: "Professor Pyrofessor and others exploit the mask code, knowing Bruce can't openly deny his identity, creating psychological warfare situations."
            },
            {
                id: "heroism-doubt",
                label: "Am I Really\na Hero?",
                x: 35,
                y: 55,
                size: 80,
                color: "#4ecdc4",
                intensity: 6,
                description: "Bruce struggles with whether he's truly heroic or just doing a job. The real Mongoose considers him the greater hero for his vulnerability."
            },
            {
                id: "isolation",
                label: "Complete\nIsolation",
                x: 25,
                y: 25,
                size: 85,
                color: "#4ecdc4",
                intensity: 7,
                description: "The deception requires total commitment, preventing Bruce from having any authentic human connections or honest conversations about his life."
            }
        ];

        const connections = [
            {from: "identity-core", to: "assassination"},
            {from: "identity-core", to: "mask-code"},
            {from: "identity-core", to: "dating"},
            {from: "identity-core", to: "public-expectation"},
            {from: "mask-code", to: "villain-games"},
            {from: "public-expectation", to: "heroism-doubt"},
            {from: "family-protection", to: "identity-core"},
            {from: "isolation", to: "dating"},
            {from: "villain-games", to: "assassination"}
        ];

        const container = document.getElementById('tension-map');
        const containerRect = container.getBoundingClientRect();

        // Create tension zones
        tensions.forEach(tension => {
            const zone = document.createElement('div');
            zone.className = 'tension-zone';
            zone.id = tension.id;
            zone.style.left = `${tension.x}%`;
            zone.style.top = `${tension.y}%`;
            zone.style.width = `${tension.size}px`;
            zone.style.height = `${tension.size}px`;
            zone.style.background = `radial-gradient(circle, ${tension.color}dd, ${tension.color}44)`;
            zone.style.border = `3px solid ${tension.color}`;
            zone.style.transform = 'translate(-50%, -50%)';
            
            const label = document.createElement('div');
            label.className = 'zone-label';
            label.innerHTML = tension.label.replace(/\n/g, '<br>');
            label.style.fontSize = `${Math.max(12, tension.size / 8)}px`;
            zone.appendChild(label);
            
            zone.addEventListener('click', () => showDetail(tension));
            zone.addEventListener('mouseenter', () => highlightConnections(tension.id));
            zone.addEventListener('mouseleave', () => unhighlightConnections());
            
            container.appendChild(zone);
        });

        // Create connections
        connections.forEach((conn, index) => {
            const fromEl = document.getElementById(conn.from);
            const toEl = document.getElementById(conn.to);
            
            if (fromEl && toEl) {
                const line = document.createElement('div');
                line.className = 'connection';
                line.id = `conn-${index}`;
                line.dataset.from = conn.from;
                line.dataset.to = conn.to;
                
                container.appendChild(line);
                updateConnection(line, fromEl, toEl);
            }
        });

        function updateConnection(line, fromEl, toEl) {
            const fromRect = fromEl.getBoundingClientRect();
            const toRect = toEl.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            const x1 = fromRect.left + fromRect.width / 2 - containerRect.left;
            const y1 = fromRect.top + fromRect.height / 2 - containerRect.top;
            const x2 = toRect.left + toRect.width / 2 - containerRect.left;
            const y2 = toRect.top + toRect.height / 2 - containerRect.top;
            
            const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
            const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
            
            line.style.left = `${x1}px`;
            line.style.top = `${y1}px`;
            line.style.width = `${length}px`;
            line.style.transform = `rotate(${angle}deg)`;
        }

        function showDetail(tension) {
            const detailBox = document.getElementById('detail-box');
            const detailTitle = document.getElementById('detail-title');
            const detailContent = document.getElementById('detail-content');
            
            detailTitle.textContent = tension.label.replace(/\n/g, ' ');
            detailContent.textContent = tension.description;
            
            const zone = document.getElementById(tension.id);
            const zoneRect = zone.getBoundingClientRect();
            const containerRect = container.getBoundingClientRect();
            
            detailBox.style.left = `${zoneRect.left - containerRect.left + tension.size / 2 + 20}px`;
            detailBox.style.top = `${zoneRect.top - containerRect.top}px`;
            detailBox.style.display = 'block';
            
            // Hide after 5 seconds
            setTimeout(() => {
                detailBox.style.display = 'none';
            }, 5000);
        }

        function highlightConnections(zoneId) {
            document.querySelectorAll('.connection').forEach(conn => {
                if (conn.dataset.from === zoneId || conn.dataset.to === zoneId) {
                    conn.style.background = 'linear-gradient(to right, transparent, rgba(255,107,107,0.8), transparent)';
                    conn.style.height = '4px';
                } else {
                    conn.style.opacity = '0.2';
                }
            });
        }

        function unhighlightConnections() {
            document.querySelectorAll('.connection').forEach(conn => {
                conn.style.background = 'linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent)';
                conn.style.height = '2px';
                conn.style.opacity = '1';
            });
        }

        // Pulse animation for high-intensity zones
        tensions.filter(t => t.intensity >= 8).forEach(tension => {
            const zone = document.getElementById(tension.id);
            zone.style.animation = `pulse ${11 - tension.intensity}s infinite`;
        });

        // Add pulse animation CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes pulse {
                0% { box-shadow: 0 0 10px currentColor; }
                50% { box-shadow: 0 0 30px currentColor, 0 0 50px currentColor; }
                100% { box-shadow: 0 0 10px currentColor; }
            }
        `;
        document.head.appendChild(style);

        // Click outside to close detail box
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.tension-zone') && !e.target.closest('.detail-box')) {
                document.getElementById('detail-box').style.display = 'none';
            }
        });
    </script>
</body>
</html>
