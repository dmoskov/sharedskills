                    <h3>Chapter 1: The Announcement</h3>
                    
                    <p>The villain called himself Terminus. No grandiose costume, no theatrical flair—just a man in a simple black suit standing before every screen in the city.</p>
                    
                    <div class="scene">"Citizens of this city, I am Terminus. In seventy-two hours, at noon in Founders Square, I will demonstrate the permanent death of your beloved Masculine Mongoose. This is not a threat. This is not a challenge. This is simply what will happen."</div>
                    
                    <p>Bruce Kent sat in his apartment, watching his death sentence delivered with corporate efficiency. His hands didn't shake—they'd stopped doing that years ago. Instead, he felt a strange lightness, almost relief.</p>
                    
                    <div class="internal">Finally. An ending.</div>
                    
                    <p>His phone buzzed. The Organization, as always, had protocols.</p>
                    
                    <div class="dialogue">"Mongoose, report to briefing immediately."</div>
                    
                    <h3>Chapter 2: The Briefing</h3>
                    
                    <p>The conference room held the usual suspects: handlers, analysts, people whose names Bruce had never been told. On the wall, Terminus's face—ordinary, forgettable, except for the absolute certainty in his eyes.</p>
                    
                    <div class="dialogue">"He's not bluffing," the lead analyst said. "Our intelligence suggests he's developed something called the Absolute Nullifier. It doesn't just kill—it prevents any form of resurrection, healing, or return. Permanent death, even for true immortals."</div>

                    <div class="dialogue">"We'll create a distraction, fake an emergency elsewhere. The public will understand why you couldn't attend your own execution."</div>

                    <div class="dialogue">"No."</div>
                    
                    <h3>Chapter 3: The Choice</h3>
                    
                    <p>The room erupted. Protocols, procedures, contingencies—words thrown like weapons at a man who'd already made his choice.</p>
                    
                    <div class="dialogue">"You'll blow the entire operation!"</div>
                    <div class="dialogue">"Baibhav's family—"</div>
                    <div class="dialogue">"The city needs—"</div>
                    
                    <div class="dialogue">"The city," Bruce interrupted, his voice steady as his hands, "needs to see their hero face death without flinching. That's what heroes do."</div>
                    
                    <p>His handler's face went through several expressions before settling on understanding. They'd chosen Bruce for his willingness to sacrifice. They shouldn't be surprised when he actually did it.</p>
                    
                    <div class="dialogue">"You'll die."</div>
                    
                    <div class="dialogue">"I've been dying for five years. At least this time, it'll mean something."</div>
                    
                    <h3>Chapter 4: Seventy-Two Hours</h3>
                    
                    <p>Bruce spent his remaining time methodically. He wrote letters—not goodbyes, but explanations. For Baibhav, whose guilt would be crushing. For the Organization, who would need to find another sacrifice. For a mother he hadn't spoken to in five years, who still believed her son worked in accounting.</p>
                    
                    <p>He visited places he'd saved, invisible in civilian clothes. A playground where he'd stopped a bombing. A hospital that still stood because he'd thrown himself between it and a villain's rage. They didn't know him, would never know him, but he knew them.</p>
                    
                    <p>On the final night, Baibhav called. The real Mongoose, the man with power and purpose and a family to protect.</p>
                    
                    <div class="dialogue">"You don't have to do this."</div>
                    
                    <div class="dialogue">"Yes, I do. We both know what happens if the Mongoose runs. Every villain would know there's something he fears. They'd never stop hunting for the weakness."</div>
                    
                    <div class="dialogue">"I could—"</div>
                    
                    <div class="dialogue">"Your children need you. That's why we're doing this, remember? So they can have a father."</div>
                    
                    <p>Silence on the line. Then, quietly: <span class="dialogue">"I'm sorry."</span></p>
                    
                    <div class="dialogue">"Don't be. I chose this. Every day for five years, I chose this. Tomorrow's just... the last choice."</div>
                    
                    <h3>Chapter 5: Founders Square</h3>
                    
                    <p>The crowd was massive. Heroes lined the rooftops—real ones, with real powers, who could actually help if things went wrong. Bruce stood in the center of the square, the Mongoose suit feeling heavier than usual.</p>
                    
                    <p>Terminus appeared exactly at noon, carrying a small device that looked disappointingly ordinary.</p>
                    
                    <div class="dialogue">"Masculine Mongoose. I assume you've researched what this does?"</div>
                    
                    <div class="dialogue">"Permanent death," Bruce said, his voice carrying across the silent square. "No resurrection, no return."</div>
                    
                    <div class="dialogue">"And yet you came."</div>
                    
                    <div class="dialogue">"Heroes don't run."</div>
                    
                    <p>Terminus studied him, and for a moment, Bruce saw something flicker in those certain eyes—confusion, perhaps even respect.</p>
                    
                    <div class="dialogue">"You know something," Terminus said quietly, only for Bruce to hear. "You know this will actually work on you. You're not really—"</div>
                    
                    <div class="dialogue">"I'm exactly who this city needs me to be," Bruce interrupted. "Are you going to test your device or not?"</div>
                    
                    <h3>Chapter 6: The Truth in Dying</h3>
                    
                    <p>The device activated with a simple hum. No light show, no dramatic effects—just a growing certainty that this was the end.</p>
                    
                    <p>Bruce felt it immediately. Not pain, but cessation. His cells stopping their dance, his heart forgetting its rhythm. He had seconds, maybe less.</p>
                    
                    <p>He could see the crowd, the horror dawning on their faces as their invincible hero swayed. He could see heroes preparing to intervene, to save him.</p>
                    
                    <p>With his last strength, Bruce raised his hand—stop. Let this happen. Let them see.</p>
                    
                    <div class="internal">This is what heroism looks like. Not the power to survive everything, but the choice to face it anyway.</div>
                    
                    <p>He fell to his knees, then forward. The Mongoose mask cracked against the concrete, and through the broken eyepiece, Bruce Kent's very human eye stared at the sky.</p>
                    
                    <p>Terminus stepped back, his certainty shattered. He'd expected tricks, resurrections, the usual hero dramatics. Not this. Not actual death.</p>
                    
                    <div class="dialogue">"No," he whispered. "You're supposed to be invulnerable. You're supposed to be—"</div>
                    
                    <p>But Bruce couldn't hear him anymore.</p>
                    
                    <h3>Epilogue: The Legend</h3>
                    
                    <p>The city mourned like it had lost its heart. The footage played endlessly—the Mongoose standing firm, refusing to run, raising his hand to stop anyone from interfering with his sacrifice.</p>
                    
                    <p>Villains went quiet. If the Mongoose could die—truly die—for this city, what did that mean? What had they been fighting all along?</p>
                    
                    <p>In a bunker miles away, Baibhav Hegadi held his children and wept. They would grow up in a safer world because a powerless man had pretended to be powerful, and then proved that true strength had nothing to do with invulnerability.</p>
                    
                    <p>The Organization began searching for another volunteer, another brave fool willing to wear the mask. But they knew, as everyone now knew, that there had only ever been one Masculine Mongoose.</p>
                    
                    <p>Not the man with powers. The man who chose to die so others could live.</p>
                    
                    <p>In the end, Bruce Kent got what he'd always wanted—to be a real hero. It had just cost him everything.</p>
                    
                    <div class="internal">But then again, that's what heroes do.</div>
                `

                keyTension: ["Luck vs. Skill", "Probability & Reality", "Inevitable Harm"],
                relationships: ["Bruce & Chance", "Survival & Statistics", "Skill Without Power"],
                centralConflict: "Bruce must rely purely on human skill and intelligence when the universe itself conspires to expose his vulnerability.",
                rating: 8.2
            },
            {
                title: "The Documentary",
                premise: "A filmmaker gets approval to create an intimate documentary about the Mongoose's daily life. Bruce must perform his entire existence for cameras while ensuring nothing reveals the deception, as the filmmaker keeps pushing for 'authentic' moments.",
                keyTension: ["Performance Within Performance", "Documented Lies", "Authentic Fakeness"],
                relationships: ["Bruce & The Camera", "Truth & Documentation", "Public & Private"],
                centralConflict: "Bruce must make his fake life appear real for cameras trying to capture reality, creating layers of performance that threaten to collapse.",
                rating: 9.4
            }
        ];

        function getRatingClass(rating) {
            if (rating >= 9.5) return 'rating-high';
            if (rating >= 8.5) return 'rating-medium';
            return 'rating-low';
        }

        function getRatingStars(rating) {
            const fullStars = Math.floor(rating);
            const halfStar = rating % 1 >= 0.5 ? '½' : '';
            return '★'.repeat(fullStars) + halfStar;
        }

        function displayStories() {
            const tbody = document.getElementById('storiesTableBody');
            tbody.innerHTML = '';
            
            // Sort stories by rating (highest first)
            const sortedStories = [...storyIdeas].sort((a, b) => b.rating - a.rating);
            
            sortedStories.forEach((story, index) => {
                const row = document.createElement('tr');
                row.style.opacity = '0';
                row.style.transform = 'translateY(10px)';
                
                row.innerHTML = `
                    <td>
                        <div class="story-number">${index + 1}</div>
                    </td>
                    <td>
                        <div class="story-title ${story.fullStory ? 'clickable-title' : ''}" 
                             ${story.fullStory ? `onclick="openStory('${story.title.replace(/'/g, "\\'")}')"` : ''}>
                            ${story.title}
                        </div>
                        <div class="story-premise">${story.premise}</div>
                    </td>
                    <td class="tags-cell">
                        ${story.keyTension.map(tension => `<span class="tension-tag">${tension}</span>`).join('')}
                    </td>
                    <td class="tags-cell">
                        ${story.relationships.map(rel => `<span class="relationship-tag">${rel}</span>`).join('')}
                    </td>
                    <td class="conflict-cell">
                        ${story.centralConflict}
                    </td>
                    <td class="rating-cell ${getRatingClass(story.rating)}">
                        ${story.rating}
                        <span class="rating-stars">${getRatingStars(story.rating)}</span>
                    </td>
                `;
                
                tbody.appendChild(row);
                
                // Animate row appearance
                setTimeout(() => {
                    row.style.transition = 'all 0.3s ease';
                    row.style.opacity = '1';
                    row.style.transform = 'translateY(0)';
                }, index * 50);
            });
        }

        // Display stories on load
        window.addEventListener('load', () => {
            displayStories();
            
            // Auto-open "The Final Test" story after a brief delay for animation
            setTimeout(() => {
                openStory('The Final Test');
            }, 800);
        });
        
        // Modal functions
        function openStory(title) {
            const story = storyIdeas.find(s => s.title === title);
            if (!story || !story.fullStory) return;
            
            const modal = document.getElementById('storyModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalRating = document.getElementById('modalRating');
            const storyContent = document.getElementById('storyContent');
            
            modalTitle.textContent = story.title;
            modalRating.innerHTML = `Rating: ${story.rating} ${getRatingStars(story.rating)}`;
            storyContent.innerHTML = story.fullStory;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            const modal = document.getElementById('storyModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        // Close modal on outside click
        document.getElementById('storyModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
